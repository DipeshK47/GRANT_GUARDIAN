<svg width="100%" viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Stage 1: Intake -->
<rect x="215" y="30" width="250" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="340" y="52" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Opportunity intake</text>
<text font-size="12" x="340" y="72" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Paste grant URL or upload RFP</text>

<line x1="340" y1="86" x2="340" y2="114" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Stage 2: Fit Score -->
<rect x="215" y="114" width="250" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="340" y="136" text-anchor="middle" dominant-baseline="central" fill="#3C3489">990 fit scoring</text>
<text font-size="12" x="340" y="156" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Pursue / skip recommendation</text>

<!-- Decision diamond -->
<line x1="340" y1="170" x2="340" y2="196" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
<polygon points="340,196 380,224 340,252 300,224" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="12" x="340" y="224" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Pursue?</text>

<!-- No branch -->
<line x1="380" y1="224" x2="558" y2="224" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="558" y="202" width="90" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="603" y="224" text-anchor="middle" dominant-baseline="central" fill="#444441">Skip</text>
<text font-size="12" x="474" y="216" text-anchor="middle" fill="#5F5E5A">no</text>

<!-- Yes branch -->
<line x1="340" y1="252" x2="340" y2="282" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="12" x="352" y="270" text-anchor="start" fill="#534AB7">yes</text>

<!-- Stage 3: Evidence -->
<rect x="215" y="282" width="250" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="340" y="304" text-anchor="middle" dominant-baseline="central" fill="#085041">Evidence mapping</text>
<text font-size="12" x="340" y="324" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Coverage score per question</text>

<line x1="340" y1="338" x2="340" y2="366" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Stage 4: Draft -->
<rect x="215" y="366" width="250" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="340" y="388" text-anchor="middle" dominant-baseline="central" fill="#085041">Grounded drafting</text>
<text font-size="12" x="340" y="408" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">DNA-aligned, evidence-cited</text>

<line x1="340" y1="422" x2="340" y2="450" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Stage 5: Review -->
<rect x="215" y="450" width="250" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="340" y="472" text-anchor="middle" dominant-baseline="central" fill="#633806">Human review</text>
<text font-size="12" x="340" y="492" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Approve in Notion before submit</text>

<line x1="340" y1="506" x2="340" y2="534" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Stage 6: Submit -->
<rect x="215" y="534" width="250" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="340" y="556" text-anchor="middle" dominant-baseline="central" fill="#633806">Submittable autopilot</text>
<text font-size="12" x="340" y="576" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Prefill portal, log every step</text>

<line x1="340" y1="590" x2="340" y2="618" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Stage 7: Awarded -->
<rect x="215" y="618" width="250" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="340" y="640" text-anchor="middle" dominant-baseline="central" fill="#27500A">Post-award reporting</text>
<text font-size="12" x="340" y="660" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">Calendar, tasks, templates — auto</text>

<!-- Side labels -->
<text font-size="12" x="50" y="58" text-anchor="middle" fill="#534AB7">intake</text>
<line x1="50" y1="65" x2="50" y2="170" stroke="#CECBF6" stroke-width="0.5"/>
<text font-size="12" x="50" y="230" text-anchor="middle" fill="#534AB7">decide</text>
<line x1="50" y1="238" x2="50" y2="338" stroke="#9FE1CB" stroke-width="0.5"/>
<text font-size="12" x="50" y="380" text-anchor="middle" fill="#0F6E56">build</text>
<line x1="50" y1="388" x2="50" y2="506" stroke="#FAC775" stroke-width="0.5"/>
<text font-size="12" x="50" y="530" text-anchor="middle" fill="#854F0B">review</text>
<line x1="50" y1="538" x2="50" y2="618" stroke="#FAC775" stroke-width="0.5"/>
<text font-size="12" x="50" y="660" text-anchor="middle" fill="#3B6D11">award</text>

<!-- Rejection memory loop -->
<path d="M605 224 L640 224 L640 646 L465 646" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text font-size="12" x="648" y="390" text-anchor="start" fill="#5F5E5A">rejection</text>
<text font-size="12" x="648" y="404" text-anchor="start" fill="#5F5E5A">memory</text>
<text font-size="12" x="648" y="418" text-anchor="start" fill="#5F5E5A">stored</text>

<text font-size="12" x="340" y="730" text-anchor="middle" fill="#5F5E5A">every step reads from and writes back to Notion</text>
</svg>
