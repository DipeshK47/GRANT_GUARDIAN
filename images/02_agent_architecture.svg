<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Central Notion hub -->
<rect x="240" y="216" width="200" height="64" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text font-size="14" font-weight="600" x="340" y="241" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Notion workspace</text>
<text font-size="12" x="340" y="261" text-anchor="middle" dominant-baseline="central" fill="#534AB7">source of truth + control plane</text>

<!-- Agent 1: Intake (top left) -->
<rect x="40" y="40" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="115" y="62" text-anchor="middle" dominant-baseline="central" fill="#085041">Intake agent</text>
<text font-size="12" x="115" y="80" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">URL, PDF, RFP parsing</text>
<line x1="190" y1="72" x2="238" y2="230" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Agent 2: Fit (top center) -->
<rect x="265" y="40" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="340" y="62" text-anchor="middle" dominant-baseline="central" fill="#085041">Fit agent</text>
<text font-size="12" x="340" y="80" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">990 scoring + portfolio</text>
<line x1="340" y1="96" x2="340" y2="215" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Agent 3: Evidence (top right) -->
<rect x="490" y="40" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="565" y="62" text-anchor="middle" dominant-baseline="central" fill="#085041">Evidence agent</text>
<text font-size="12" x="565" y="80" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">semantic coverage mapping</text>
<line x1="490" y1="72" x2="442" y2="230" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Agent 4: Narrative (left) -->
<rect x="40" y="220" width="150" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="115" y="242" text-anchor="middle" dominant-baseline="central" fill="#633806">Narrative agent</text>
<text font-size="12" x="115" y="260" text-anchor="middle" dominant-baseline="central" fill="#854F0B">grounded draft writing</text>
<line x1="190" y1="248" x2="238" y2="248" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Agent 5: Review (right) -->
<rect x="490" y="220" width="150" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="565" y="242" text-anchor="middle" dominant-baseline="central" fill="#633806">Review agent</text>
<text font-size="12" x="565" y="260" text-anchor="middle" dominant-baseline="central" fill="#854F0B">human approval routing</text>
<line x1="490" y1="248" x2="442" y2="248" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Agent 6: Submission (bottom left) -->
<rect x="40" y="400" width="150" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="115" y="422" text-anchor="middle" dominant-baseline="central" fill="#712B13">Submission agent</text>
<text font-size="12" x="115" y="440" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Submittable autopilot</text>
<line x1="190" y1="428" x2="238" y2="282" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Agent 7: Compliance (bottom right) -->
<rect x="490" y="400" width="150" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="565" y="422" text-anchor="middle" dominant-baseline="central" fill="#712B13">Compliance agent</text>
<text font-size="12" x="565" y="440" text-anchor="middle" dominant-baseline="central" fill="#993C1D">post-award reporting</text>
<line x1="490" y1="428" x2="442" y2="282" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)"/>

<!-- External: ProPublica -->
<rect x="170" y="430" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="235" y="452" text-anchor="middle" dominant-baseline="central" fill="#444441">ProPublica API</text>
<line x1="235" y1="430" x2="290" y2="282" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- External: Playwright -->
<rect x="380" y="430" width="100" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="430" y="452" text-anchor="middle" dominant-baseline="central" fill="#444441">Playwright</text>
<line x1="430" y1="430" x2="390" y2="282" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Legend -->
<rect x="100" y="498" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="12" x="118" y="508" fill="#444441">intake + analysis</text>
<rect x="240" y="498" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="12" x="258" y="508" fill="#444441">drafting + review</text>
<rect x="380" y="498" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="12" x="398" y="508" fill="#444441">submission + compliance</text>
</svg>
