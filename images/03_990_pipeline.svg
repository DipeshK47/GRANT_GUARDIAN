<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Input: Funder URL -->
<rect x="40" y="162" width="120" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="100" y="184" text-anchor="middle" dominant-baseline="central" fill="#444441">Funder URL</text>
<text font-size="12" x="100" y="202" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">pasted by user</text>
<line x1="160" y1="190" x2="188" y2="190" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Website scrape -->
<rect x="188" y="162" width="120" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="248" y="184" text-anchor="middle" dominant-baseline="central" fill="#444441">Website scrape</text>
<text font-size="12" x="248" y="202" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">stated priorities</text>

<!-- ProPublica query -->
<rect x="188" y="56" width="120" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="248" y="74" text-anchor="middle" dominant-baseline="central" fill="#3C3489">ProPublica API</text>
<text font-size="12" x="248" y="92" text-anchor="middle" dominant-baseline="central" fill="#534AB7">990-PF grant history</text>
<line x1="248" y1="162" x2="248" y2="112" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 990 output 1: Actual giving data -->
<line x1="308" y1="84" x2="352" y2="84" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="352" y="56" width="140" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="422" y="74" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Actual giving data</text>
<text font-size="12" x="422" y="92" text-anchor="middle" dominant-baseline="central" fill="#534AB7">avg grant, org budget range</text>

<!-- 990 output 2: Grant DNA -->
<line x1="308" y1="190" x2="352" y2="145" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
<line x1="308" y1="190" x2="352" y2="190" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="352" y="162" width="140" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="422" y="184" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Grant DNA</text>
<text font-size="12" x="422" y="202" text-anchor="middle" dominant-baseline="central" fill="#534AB7">vocabulary fingerprint</text>

<!-- 990 output 3: Geographic trend -->
<line x1="308" y1="190" x2="352" y2="268" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
<rect x="352" y="268" width="140" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="422" y="290" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Geographic trend</text>
<text font-size="12" x="422" y="308" text-anchor="middle" dominant-baseline="central" fill="#534AB7">focus areas by year</text>

<!-- Fit score output -->
<line x1="492" y1="84" x2="564" y2="162" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="492" y1="190" x2="522" y2="190" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="492" y1="296" x2="564" y2="218" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="522" y="148" width="120" height="84" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="582" y="176" text-anchor="middle" dominant-baseline="central" fill="#085041">Fit score</text>
<text font-size="12" x="582" y="196" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">0 to 100, 990-backed</text>
<text font-size="12" x="582" y="214" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">pursue / skip call</text>

<!-- Written to Notion -->
<line x1="582" y1="232" x2="582" y2="308" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="502" y="308" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="600" x="582" y="330" text-anchor="middle" dominant-baseline="central" fill="#085041">Written to Notion</text>
<text font-size="12" x="582" y="348" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Funder record + Opportunity</text>

<!-- Key insight labels -->
<text font-size="12" x="248" y="360" text-anchor="middle" fill="#534AB7">what they say</text>
<text font-size="12" x="422" y="360" text-anchor="middle" fill="#534AB7">what they actually do</text>
<line x1="248" y1="350" x2="248" y2="340" stroke="#CECBF6" stroke-width="0.5"/>
<line x1="422" y1="350" x2="422" y2="336" stroke="#CECBF6" stroke-width="0.5"/>
